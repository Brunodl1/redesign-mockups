<!-- ============================================================
     Soniaz Cosmetics — Newsletter Signup
     Section 10 · Burgundy band with cream text
     ============================================================ -->

<section class="sec s-newsletter" aria-labelledby="newsletter-heading">
  <div class="wrap s-newsletter__wrap">

    <!-- Eyebrow -->
    <p class="eyebrow s-newsletter__eyebrow">Join the List</p>

    <!-- Heading -->
    <h2 class="s-newsletter__heading" id="newsletter-heading">
      Get 10% off your first order.
    </h2>

    <!-- Sub copy -->
    <p class="s-newsletter__body">
      Be first for new shades, restocks and brown-girl beauty tips — straight to your inbox.
    </p>

    <!-- Inline email form -->
    <form class="s-newsletter__form" onsubmit="return false" aria-label="Newsletter signup">
      <div class="s-newsletter__field-wrap">
        <label for="nl-email" class="s-newsletter__label">Email address</label>
        <input
          id="nl-email"
          class="s-newsletter__input"
          type="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
          aria-required="true"
        >
      </div>
      <button type="submit" class="btn btn-light s-newsletter__btn">
        Subscribe
      </button>
    </form>

    <!-- Tiny print -->
    <p class="s-newsletter__fine">Unsubscribe anytime.</p>

  </div>
</section>
