<!-- ============================================================
     Soniaz Cosmetics — Announcement Bar + Header
     Glam editorial · South-Asian / melanin-rich makeup · EN
     ============================================================ -->

<!-- Announcement Bar -->
<div class="announce">
  <div class="announce__inner wrap">
    <span class="announce__full">Halal-certified &nbsp;·&nbsp; Vegan &amp; cruelty-free &nbsp;&nbsp;&nbsp;·&nbsp;&nbsp;&nbsp; Free shipping over $60 &nbsp;&nbsp;&nbsp;·&nbsp;&nbsp;&nbsp; Made for melanin-rich skin</span>
    <span class="announce__mobile">Halal-certified &nbsp;·&nbsp; Vegan &amp; cruelty-free</span>
  </div>
</div>

<!-- Site Header -->
<header class="site-header" role="banner">
  <div class="site-header__inner wrap">

    <!-- LEFT: hamburger (mobile) / nav (desktop) -->
    <div class="site-header__left">

      <!-- Hamburger — mobile only -->
      <button class="site-header__hamburger" aria-label="Open menu" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
          <line x1="2" y1="5.5" x2="20" y2="5.5"/>
          <line x1="2" y1="11" x2="20" y2="11"/>
          <line x1="2" y1="16.5" x2="20" y2="16.5"/>
        </svg>
      </button>

      <!-- Nav — desktop only -->
      <nav class="site-header__nav" aria-label="Primary navigation">
        <ul class="site-header__nav-list">
          <li><a href="https://www.google.com" class="site-header__nav-link">Shop</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Lipstick</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Blush</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">About</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Ambassadors</a></li>
        </ul>
      </nav>
    </div>

    <!-- CENTER: logo -->
    <div class="site-header__logo">
      <a href="https://www.google.com" aria-label="Soniaz Cosmetics — home">
        <img src="assets/logo.png" alt="Soniaz Cosmetics" class="site-header__logo-img">
      </a>
    </div>

    <!-- RIGHT: actions -->
    <div class="site-header__right">

      <!-- Shop CTA — desktop only -->
      <a href="https://www.google.com" class="btn btn-primary site-header__cta" aria-label="Shop now">Shop</a>

      <!-- Search — desktop only -->
      <button class="site-header__icon site-header__icon--search site-header__icon--desktop" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9.5" cy="9.5" r="6.5"/>
          <line x1="14.5" y1="14.5" x2="20" y2="20"/>
        </svg>
      </button>

      <!-- Account — desktop only -->
      <button class="site-header__icon site-header__icon--account site-header__icon--desktop" aria-label="My account">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="7.5" r="3.5"/>
          <path d="M3 20c0-4.418 3.582-8 8-8s8 3.582 8 8"/>
        </svg>
      </button>

      <!-- Cart — always visible -->
      <button class="site-header__icon site-header__icon--cart" aria-label="Cart — 0 items">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 2h2.5l1.6 8.5h10.9l1.5-6H6.5"/>
          <circle cx="9" cy="19" r="1.5"/>
          <circle cx="17" cy="19" r="1.5"/>
        </svg>
        <span class="site-header__cart-badge" aria-hidden="true">0</span>
      </button>

    </div>
  </div>
</header>
