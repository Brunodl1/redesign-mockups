<section class="sec s-badges" aria-label="Certifications sans">
  <div class="wrap">
    <ul class="s-badges__list" role="list" aria-label="Ingrédients absents">

      <!-- Sans bicarbonate -->
      <li class="s-badges__item">
        <svg class="s-badges__icon" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- flask / chemistry -->
          <path d="M11 4v8L5 22h20L19 12V4"/>
          <line x1="11" y1="4" x2="19" y2="4"/>
          <line x1="8" y1="18" x2="13" y2="15"/>
        </svg>
        <span class="s-badges__label">Sans bicarbonate</span>
      </li>

      <!-- Sans aluminium -->
      <li class="s-badges__item">
        <svg class="s-badges__icon" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- atom / element -->
          <circle cx="15" cy="15" r="2.5"/>
          <ellipse cx="15" cy="15" rx="11" ry="5" transform="rotate(0 15 15)"/>
          <ellipse cx="15" cy="15" rx="11" ry="5" transform="rotate(60 15 15)"/>
          <ellipse cx="15" cy="15" rx="11" ry="5" transform="rotate(120 15 15)"/>
        </svg>
        <span class="s-badges__label">Sans aluminium</span>
      </li>

      <!-- Sans cire -->
      <li class="s-badges__item">
        <svg class="s-badges__icon" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- candle / wax flame -->
          <rect x="10" y="16" width="10" height="10" rx="2"/>
          <path d="M15 16V10"/>
          <path d="M12 10c0-2 3-5 3-5s3 3 3 5a3 3 0 01-6 0z"/>
        </svg>
        <span class="s-badges__label">Sans cire</span>
      </li>

      <!-- Sans parfum synthétique -->
      <li class="s-badges__item">
        <svg class="s-badges__icon" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- perfume bottle crossed -->
          <rect x="9" y="11" width="12" height="15" rx="2"/>
          <path d="M12 11V8h6v3"/>
          <path d="M15 8V5"/>
          <line x1="7" y1="7" x2="23" y2="23" stroke-width="1.8"/>
        </svg>
        <span class="s-badges__label">Sans parfum synthétique</span>
      </li>

      <!-- Sans plastique -->
      <li class="s-badges__item">
        <svg class="s-badges__icon" viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- leaf / eco -->
          <path d="M6 24c0 0 6-10 18-18C24 6 10 8 6 24z"/>
          <path d="M6 24c3-4 6-7 10-10"/>
        </svg>
        <span class="s-badges__label">Sans plastique</span>
      </li>

    </ul>
  </div>
</section>
