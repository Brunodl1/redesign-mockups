<!-- ============================================================
     NU-DEO · Header + Announcement Bar
     01-header.html
     ============================================================ -->

<!-- Announcement bar -->
<div class="announce" role="complementary" aria-label="Informations de livraison">
  <div class="announce__inner">
    <span class="announce__full">
      <span>Livraison gratuite dès 50&nbsp;$</span>
      <span class="announce__dot" aria-hidden="true">&nbsp;·&nbsp;</span>
      <span>Sans aluminium, sans bicarbonate</span>
      <span class="announce__dot" aria-hidden="true">&nbsp;·&nbsp;</span>
      <span>Fait main au Québec</span>
    </span>
    <span class="announce__short" aria-hidden="true">Livraison gratuite dès 50&nbsp;$</span>
  </div>
</div>

<!-- Site header -->
<header class="site-header" role="banner">
  <div class="wrap site-header__inner">

    <!-- LEFT: hamburger (mobile) / nav links (desktop) -->
    <nav class="site-header__nav" aria-label="Navigation principale">
      <!-- Hamburger: mobile only -->
      <button class="site-header__burger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="mobile-nav">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
          <line x1="2" y1="6"  x2="20" y2="6"/>
          <line x1="2" y1="11" x2="20" y2="11"/>
          <line x1="2" y1="16" x2="20" y2="16"/>
        </svg>
      </button>
      <!-- Desktop nav links -->
      <ul class="site-header__links" role="list">
        <li><a href="https://www.google.com">Boutique</a></li>
        <li><a href="https://www.google.com">Nos parfums</a></li>
        <li><a href="https://www.google.com">Ingrédients</a></li>
        <li><a href="https://www.google.com">Notre histoire</a></li>
        <li><a href="https://www.google.com">FAQ</a></li>
      </ul>
    </nav>

    <!-- CENTER: logo -->
    <a href="https://www.google.com" class="site-header__logo" aria-label="NU-DEO — Accueil">
      <img
        src="assets/logo.png"
        alt="NU-DEO"
        class="site-header__logo-img"
        width="auto"
        height="30"
        loading="eager"
        decoding="async"
      >
    </a>

    <!-- RIGHT: actions cluster -->
    <div class="site-header__actions">
      <!-- Magasiner pill — desktop only -->
      <a href="https://www.google.com" class="btn btn-primary site-header__cta" aria-label="Magasiner la boutique">Magasiner</a>

      <!-- Search — desktop only -->
      <button class="site-header__icon site-header__icon--desktop" aria-label="Rechercher">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9.5" cy="9.5" r="6.5"/>
          <line x1="14.5" y1="14.5" x2="20" y2="20"/>
        </svg>
      </button>

      <!-- Account — desktop only -->
      <button class="site-header__icon site-header__icon--desktop" aria-label="Mon compte">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="7.5" r="4"/>
          <path d="M3 20c0-4.418 3.582-8 8-8s8 3.582 8 8"/>
        </svg>
      </button>

      <!-- Cart — always visible -->
      <button class="site-header__icon site-header__cart" aria-label="Panier, 0 article">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 002 2h12a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="site-header__badge" aria-hidden="true">0</span>
      </button>
    </div>

  </div>
</header>

<!-- Mobile nav drawer (hidden by default) -->
<nav class="site-header__mobile-nav" id="mobile-nav" aria-label="Menu mobile" aria-hidden="true">
  <ul role="list">
    <li><a href="https://www.google.com">Boutique</a></li>
    <li><a href="https://www.google.com">Nos parfums</a></li>
    <li><a href="https://www.google.com">Ingrédients</a></li>
    <li><a href="https://www.google.com">Notre histoire</a></li>
    <li><a href="https://www.google.com">FAQ</a></li>
    <li class="site-header__mobile-cta">
      <a href="https://www.google.com" class="btn btn-primary btn-block">Magasiner</a>
    </li>
  </ul>
</nav>
