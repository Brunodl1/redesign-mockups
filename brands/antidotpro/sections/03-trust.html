<!-- ============================================================
     AntidotPro · 03-trust.html
     Trust strip — 4 icon+label items, slim, bg --surface-2
     ============================================================ -->

<section class="sec s-trust" aria-label="Trust signals">
  <div class="wrap">
    <ul class="s-trust__list" role="list">

      <!-- 1. No Burning or Itching -->
      <li class="s-trust__item">
        <span class="s-trust__icon-wrap" aria-hidden="true">
          <svg class="ic" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Shield -->
            <path d="M20 4L8 9v10c0 7.2 5.1 13.9 12 15.9C27 32.9 32 26.2 32 19V9L20 4z"
                  stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- Cross check inside shield -->
            <line x1="14" y1="20" x2="18" y2="24" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round"/>
            <line x1="18" y1="24" x2="26" y2="16" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="s-trust__text">
          <strong class="s-trust__label">No Burning or Itching</strong>
          <span class="s-trust__sub">Comfortable every service</span>
        </div>
      </li>

      <!-- 2. Colorist-Trusted -->
      <li class="s-trust__item">
        <span class="s-trust__icon-wrap" aria-hidden="true">
          <svg class="ic" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Scissors top blade -->
            <circle cx="12" cy="13" r="4" stroke="var(--accent)" stroke-width="1.7" fill="none"/>
            <circle cx="12" cy="27" r="4" stroke="var(--accent)" stroke-width="1.7" fill="none"/>
            <!-- Blades crossing -->
            <line x1="15.5" y1="15.5" x2="32" y2="32" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round"/>
            <line x1="15.5" y1="24.5" x2="32" y2="8" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="s-trust__text">
          <strong class="s-trust__label">Colorist-Trusted</strong>
          <span class="s-trust__sub">Born in pro salons</span>
        </div>
      </li>

      <!-- 3. 31.7M+ Applications -->
      <li class="s-trust__item">
        <span class="s-trust__icon-wrap" aria-hidden="true">
          <svg class="ic" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Counter/chart bars -->
            <rect x="6"  y="24" width="6" height="10" rx="1.5" stroke="var(--accent)" stroke-width="1.7" fill="none"/>
            <rect x="17" y="16" width="6" height="18" rx="1.5" stroke="var(--accent)" stroke-width="1.7" fill="none"/>
            <rect x="28" y="8"  width="6" height="26" rx="1.5" stroke="var(--accent)" stroke-width="1.7" fill="none"/>
            <!-- Trend arrow -->
            <polyline points="6,26 17,18 28,10" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="2 2"/>
          </svg>
        </span>
        <div class="s-trust__text">
          <strong class="s-trust__label">31.7M+ Applications</strong>
          <span class="s-trust__sub">And counting</span>
        </div>
      </li>

      <!-- 4. Color · Bleach · Relaxer -->
      <li class="s-trust__item">
        <span class="s-trust__icon-wrap" aria-hidden="true">
          <svg class="ic" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Droplet -->
            <path d="M20 6 C20 6 10 18 10 25 a10 10 0 0 0 20 0 C30 18 20 6 20 6Z"
                  stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- Inner highlight line -->
            <path d="M15 26 a5 5 0 0 1 4-5" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round" fill="none" opacity=".6"/>
          </svg>
        </span>
        <div class="s-trust__text">
          <strong class="s-trust__label">Color · Bleach · Relaxer</strong>
          <span class="s-trust__sub">Works with all chemical services</span>
        </div>
      </li>

    </ul>
  </div>
</section>
