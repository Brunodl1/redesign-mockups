<!-- ============================================================
     AntidotPro · 01-header.html
     Announcement bar + Sticky site header
     ============================================================ -->

<!-- ANNOUNCEMENT BAR -->
<div class="announce">
  <div class="wrap">
    <div class="announce__inner">
      <span class="announce__item">Free shipping over $150</span>
      <span class="announce__sep" aria-hidden="true">·</span>
      <span class="announce__item announce__item--hide-mobile">31.7M+ applications &amp; counting</span>
      <span class="announce__sep announce__sep--hide-mobile" aria-hidden="true">·</span>
      <span class="announce__item announce__item--hide-mobile">Trusted by colorists worldwide</span>
    </div>
  </div>
</div>

<!-- SITE HEADER -->
<header class="site-header" role="banner">
  <div class="wrap site-header__wrap">

    <!-- LEFT: Hamburger (mobile) + Logo -->
    <div class="site-header__left">
      <button class="site-header__hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <line x1="2" y1="5"  x2="20" y2="5"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="2" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="2" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <a href="https://www.google.com" class="site-header__logo" aria-label="AntidotPro — home">
        <img
          src="assets/logo.png"
          alt="AntidotPro"
          class="site-header__logo-img"
          width="auto"
          height="26"
          loading="eager"
          decoding="async"
        >
      </a>
    </div>

    <!-- CENTER: Main nav (desktop) -->
    <nav class="site-header__nav" id="site-nav" aria-label="Main navigation">
      <ul class="site-header__nav-list" role="list">
        <li><a class="site-header__nav-link" href="https://www.google.com">Shop</a></li>
        <li><a class="site-header__nav-link" href="https://www.google.com">The System</a></li>
        <li><a class="site-header__nav-link" href="https://www.google.com">How It Works</a></li>
        <li><a class="site-header__nav-link" href="https://www.google.com">For Pros</a></li>
        <li><a class="site-header__nav-link" href="https://www.google.com">Results</a></li>
        <li><a class="site-header__nav-link" href="https://www.google.com">About</a></li>
      </ul>
    </nav>

    <!-- RIGHT: Actions -->
    <div class="site-header__actions">

      <!-- Compact red Shop pill — desktop only -->
      <a class="site-header__shop-pill btn btn-primary" href="https://www.google.com" aria-label="Shop now">Shop</a>

      <!-- Search icon — desktop only -->
      <button class="site-header__icon-btn site-header__icon-btn--hide-mobile" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <circle cx="9.5" cy="9.5" r="6.5" stroke="currentColor" stroke-width="1.8"/>
          <line x1="14.2" y1="14.2" x2="20" y2="20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Account icon — desktop only -->
      <button class="site-header__icon-btn site-header__icon-btn--hide-mobile" aria-label="Account">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <circle cx="11" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
          <path d="M3 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Cart icon — always visible -->
      <button class="site-header__icon-btn site-header__cart-btn" aria-label="Cart — 0 items">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M1 1h3.5l2.3 11.3a2 2 0 0 0 2 1.7h7.8a2 2 0 0 0 2-1.7L20 6H5.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8.5" cy="19" r="1.3" fill="currentColor"/>
          <circle cx="16.5" cy="19" r="1.3" fill="currentColor"/>
        </svg>
        <span class="site-header__cart-badge" aria-hidden="true">0</span>
      </button>

    </div>
  </div>
</header>
