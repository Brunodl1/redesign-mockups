<!-- ============================================================
     AntidotPro · 09-newsletter.html
     Newsletter signup band — red/accent background, light text
     ============================================================ -->

<section class="sec s-newsletter" aria-labelledby="nl-heading">
  <div class="wrap s-newsletter__wrap">

    <span class="eyebrow s-newsletter__eyebrow">Join the Pros</span>

    <h2 class="s-newsletter__heading" id="nl-heading">
      Get 10% off your first order
    </h2>

    <p class="s-newsletter__sub">
      Pro tips, restocks and scalp-protection offers — to your inbox.
    </p>

    <form class="s-newsletter__form" onsubmit="return false" novalidate>
      <div class="s-newsletter__field-wrap">
        <label for="nl-email" class="s-newsletter__label">Email address</label>
        <input
          id="nl-email"
          type="email"
          name="email"
          placeholder="yourname@salon.com"
          class="s-newsletter__input"
          autocomplete="email"
          required
        >
      </div>
      <button type="submit" class="btn btn-light s-newsletter__btn">Subscribe</button>
    </form>

    <p class="s-newsletter__fine">Unsubscribe anytime.</p>

  </div>
</section>
