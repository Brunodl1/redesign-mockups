<!-- ============================================================
     03-heritage.html — Empire 1917 · Bandeau héritage & confiance
     FR · Heritage strip · Dark navy bg · 4 piliers
     ============================================================ -->
<section class="sec s-heritage" aria-label="Notre héritage">
  <div class="wrap">
    <ul class="s-heritage__row" role="list">

      <!-- 1 · Depuis 1917 -->
      <li class="s-heritage__item">
        <svg class="ic s-heritage__ic" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- Shield / crest -->
          <path d="M20 4 L33 9 L33 21 C33 29 20 36 20 36 C20 36 7 29 7 21 L7 9 Z"/>
          <path d="M20 12 L23 16 L28 17 L24.5 20.5 L25.5 26 L20 23 L14.5 26 L15.5 20.5 L12 17 L17 16 Z"/>
        </svg>
        <div class="s-heritage__text">
          <strong class="s-heritage__label">Depuis 1917</strong>
          <span class="s-heritage__sub">Plus d'un siècle de savoir-faire</span>
        </div>
      </li>

      <!-- 2 · Taillé à Montréal -->
      <li class="s-heritage__item">
        <svg class="ic s-heritage__ic" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- Scissors -->
          <circle cx="11" cy="13" r="4.5"/>
          <circle cx="11" cy="27" r="4.5"/>
          <line x1="14.5" y1="15.5" x2="32" y2="32"/>
          <line x1="14.5" y1="24.5" x2="32" y2="8"/>
          <!-- Needle hint -->
          <line x1="32" y1="8" x2="36" y2="4"/>
        </svg>
        <div class="s-heritage__text">
          <strong class="s-heritage__label">Taillé à Montréal</strong>
          <span class="s-heritage__sub">Notre atelier, depuis 1932</span>
        </div>
      </li>

      <!-- 3 · Étoffes d'Europe -->
      <li class="s-heritage__item">
        <svg class="ic s-heritage__ic" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- Globe -->
          <circle cx="20" cy="20" r="14"/>
          <ellipse cx="20" cy="20" rx="7" ry="14"/>
          <line x1="6" y1="20" x2="34" y2="20"/>
          <path d="M8 13 Q20 17 32 13"/>
          <path d="M8 27 Q20 23 32 27"/>
        </svg>
        <div class="s-heritage__text">
          <strong class="s-heritage__label">Étoffes d'Europe</strong>
          <span class="s-heritage__sub">Italie · Angleterre · Écosse · Irlande</span>
        </div>
      </li>

      <!-- 4 · Sur-mesure -->
      <li class="s-heritage__item">
        <svg class="ic s-heritage__ic" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <!-- Ruler -->
          <rect x="5" y="14" width="30" height="12" rx="0"/>
          <line x1="10" y1="14" x2="10" y2="19"/>
          <line x1="15" y1="14" x2="15" y2="22"/>
          <line x1="20" y1="14" x2="20" y2="19"/>
          <line x1="25" y1="14" x2="25" y2="22"/>
          <line x1="30" y1="14" x2="30" y2="19"/>
        </svg>
        <div class="s-heritage__text">
          <strong class="s-heritage__label">Sur-mesure</strong>
          <span class="s-heritage__sub">Coupe et finitions personnalisées</span>
        </div>
      </li>

    </ul>
  </div>
</section>
