     Shop by Category — 4-tile grid (desktop 4, tablet 2, mobile 2/1)

<section class="sec s-categories" aria-labelledby="categories-heading">
  <div class="wrap">

    <!-- ── Section header ────────────────────────────────────── -->
    <div class="s-categories__header reveal">
      <p class="eyebrow s-categories__eyebrow">Shop by Category</p>
      <h2 id="categories-heading" class="s-categories__heading">Find your kind of pretty.</h2>
      <p class="s-categories__intro">
        From destination-inspired perfumes to shimmering body oils — every product is a mini getaway.
      </p>
    </div>

    <!-- ── Tile grid ─────────────────────────────────────────── -->
    <ul class="s-categories__grid" role="list">

      <!-- Tile 1 — Perfumes -->
      <li class="s-categories__tile tile reveal" style="--delay:.05s">
        <a href="https://www.google.com" class="tile__link" aria-label="Shop Perfumes">
          <div class="tile__img-wrap">
            <img
              class="tile__img"
              src="https://caprice-co.com/cdn/shop/collections/CL101078-_Format_WEB.jpg?v=1762441705&width=800"
              alt="Caprice roll-on perfumes"
              loading="lazy"
            >
          </div>
          <div class="tile__body">
            <h3 class="tile__name">Perfumes</h3>
            <span class="tile__cta">Shop <span aria-hidden="true">→</span></span>
          </div>
        </a>
      </li>

      <!-- Tile 2 — Body & Glow -->
      <li class="s-categories__tile tile reveal" style="--delay:.12s">
        <a href="https://www.google.com" class="tile__link" aria-label="Shop Body &amp; Glow">
          <div class="tile__img-wrap">
            <img
              class="tile__img"
              src="https://cdn.shopify.com/s/files/1/1824/0461/files/capriceetco_produits_Genevieve_Lesieur-76.jpg?v=1776775554&width=800"
              alt="Shimmering body oil on skin"
              loading="lazy"
            >
          </div>
          <div class="tile__body">
            <h3 class="tile__name">Body &amp; Glow</h3>
            <span class="tile__cta">Shop <span aria-hidden="true">→</span></span>
          </div>
        </a>
      </li>

      <!-- Tile 3 — Lip Treats -->
      <li class="s-categories__tile tile reveal" style="--delay:.19s">
        <a href="https://www.google.com" class="tile__link" aria-label="Shop Lip Treats">
          <div class="tile__img-wrap">
            <img
              class="tile__img"
              src="https://caprice-co.com/cdn/shop/collections/2828BCBD-E4C0-4C28-85F7-8E26829FD417.jpg?v=1741227530&width=800"
              alt="Lip scrubs and masks"
              loading="lazy"
            >
          </div>
          <div class="tile__body">
            <h3 class="tile__name">Lip Treats</h3>
            <span class="tile__cta">Shop <span aria-hidden="true">→</span></span>
          </div>
        </a>
      </li>

      <!-- Tile 4 — Candles & Home -->
      <li class="s-categories__tile tile reveal" style="--delay:.26s">
        <a href="https://www.google.com" class="tile__link" aria-label="Shop Candles &amp; Home">
          <div class="tile__img-wrap">
            <img
              class="tile__img"
              src="https://caprice-co.com/cdn/shop/collections/IMG_8066.jpg?v=1746203994&width=800"
              alt="Coconut-wax candles and home scents"
              loading="lazy"
            >
          </div>
          <div class="tile__body">
            <h3 class="tile__name">Candles &amp; Home</h3>
            <span class="tile__cta">Shop <span aria-hidden="true">→</span></span>
          </div>
        </a>
      </li>

    </ul>

    <!-- ── CTA ──────────────────────────────────────────────── -->
    <div class="s-categories__footer reveal">
      <a href="https://www.google.com" class="btn btn-outline">Shop everything</a>
    </div>

  </div>
</section>
