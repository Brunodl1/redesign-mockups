<!-- ============================================================
     Caprice & Co — 01-header.html
     Announcement bar + sticky header
     ============================================================ -->

<!-- ── ANNOUNCEMENT BAR ──────────────────────────────────────── -->
<div class="announce">
  <div class="announce__inner wrap">
    <span class="announce__full">
      Free shipping + free gift over $75
      <span class="announce__sep" aria-hidden="true">&nbsp;·&nbsp;</span>
      Vegan &amp; cruelty-free
      <span class="announce__sep" aria-hidden="true">&nbsp;·&nbsp;</span>
      Handmade in Québec ✨
    </span>
    <span class="announce__mobile">Free shipping + free gift over $75</span>
  </div>
</div>

<!-- ── STICKY HEADER ─────────────────────────────────────────── -->
<header class="site-header" role="banner">
  <div class="site-header__inner wrap">

    <!-- LEFT: hamburger (mobile) / nav (desktop) -->
    <div class="site-header__left" aria-label="Primary navigation">

      <!-- Mobile hamburger -->
      <button class="site-header__hamburger" aria-label="Open menu" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <line x1="2" y1="5"  x2="20" y2="5"  stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="2" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="2" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Desktop nav -->
      <nav class="site-header__nav" aria-label="Main">
        <ul class="site-header__nav-list" role="list">
          <li><a href="https://www.google.com" class="site-header__nav-link">Shop</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Paradise Collection</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Body</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Bath</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Lips</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Bundles</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">About</a></li>
        </ul>
      </nav>
    </div>

    <!-- CENTER: logo -->
    <div class="site-header__logo-wrap">
      <a href="https://www.google.com" class="site-header__logo-link" aria-label="Caprice & Co — home">
        <img
          src="assets/logo.png"
          alt="Caprice & Co"
          class="site-header__logo-img"
          width="160"
          height="40"
        />
      </a>
    </div>

    <!-- RIGHT: actions -->
    <div class="site-header__actions" aria-label="Header actions">

      <!-- Shop CTA (desktop) -->
      <a href="https://www.google.com" class="btn btn-primary site-header__shop-btn" aria-label="Shop now">
        Shop
      </a>

      <!-- Search (desktop) -->
      <button class="site-header__icon-btn site-header__search" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9.5" cy="9.5" r="6.5"/>
          <line x1="14.5" y1="14.5" x2="20" y2="20"/>
        </svg>
      </button>

      <!-- Account (desktop) -->
      <button class="site-header__icon-btn site-header__account" aria-label="My account">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="7.5" r="4"/>
          <path d="M3 19c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>

      <!-- Cart -->
      <button class="site-header__icon-btn site-header__cart" aria-label="Cart, 0 items">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 3h2l1.5 8.5a2 2 0 0 0 2 1.5h7a2 2 0 0 0 2-1.5L19 6H6"/>
          <circle cx="9" cy="19" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="19" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
        <span class="site-header__cart-badge" aria-hidden="true">0</span>
      </button>

    </div>
  </div>
</header>
