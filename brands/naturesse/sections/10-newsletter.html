<!-- ============================================================
     Naturesse Cosmetics — Section 10 · Infolettre
     Band verte (--accent) · FR · Natural soft-luxe
     ============================================================ -->

<section class="sec s-newsletter" aria-labelledby="newsletter-heading">
  <div class="wrap s-newsletter__wrap">

    <!-- Floating leaf accents -->
    <span class="s-newsletter__leaf s-newsletter__leaf--l" aria-hidden="true">
      <svg width="90" height="110" viewBox="0 0 90 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M45 105C45 105 5 75 5 40C5 18.9543 23.4315 2 45 2C66.5685 2 85 18.9543 85 40C85 75 45 105 45 105Z" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
        <path d="M45 105V2" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
      </svg>
    </span>
    <span class="s-newsletter__leaf s-newsletter__leaf--r" aria-hidden="true">
      <svg width="70" height="88" viewBox="0 0 70 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M35 84C35 84 4 60 4 33C4 16.4315 18.0883 3 35 3C51.9117 3 66 16.4315 66 33C66 60 35 84 35 84Z" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.13)" stroke-width="1.1"/>
        <path d="M35 84V3" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      </svg>
    </span>

    <div class="s-newsletter__body">

      <!-- Eyebrow -->
      <p class="eyebrow s-newsletter__eyebrow">Naturez-vous la vie</p>

      <!-- Heading -->
      <h2 class="s-newsletter__heading" id="newsletter-heading">
        Obtenez 10&thinsp;% sur votre première commande
      </h2>

      <!-- Sub -->
      <p class="s-newsletter__sub">
        Conseils beauté, nouveautés et offres — directement dans votre boîte courriel.
      </p>

      <!-- Inline form -->
      <form class="s-newsletter__form" onsubmit="return false" novalidate aria-label="Inscription à l'infolettre">
        <div class="s-newsletter__form-row">
          <label for="nl-email" class="sr-only">Adresse courriel</label>
          <input
            id="nl-email"
            class="s-newsletter__input"
            type="email"
            name="email"
            placeholder="votre@courriel.com"
            autocomplete="email"
            required
          />
          <button type="submit" class="btn btn-gold s-newsletter__btn">
            S'abonner
          </button>
        </div>
      </form>

      <!-- Fine print -->
      <p class="s-newsletter__fine">Désabonnement en tout temps.</p>

    </div><!-- /.s-newsletter__body -->
  </div><!-- /.wrap -->
</section>
