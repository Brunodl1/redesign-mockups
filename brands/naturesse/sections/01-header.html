<!-- ============================================================
     Naturesse Cosmetics — Announcement bar + Sticky header
     Section 01 · French · Natural soft-luxe
     ============================================================ -->

<!-- ── Announcement bar ─────────────────────────────────────── -->
<div class="announce" role="banner" aria-label="Annonces">
  <div class="announce__inner wrap">
    <span class="announce__items">
      <span class="announce__item announce__item--primary">
        <a href="https://www.google.com">Livraison gratuite au Canada dès 60&thinsp;$</a>
      </span>
      <span class="announce__sep" aria-hidden="true">&nbsp;·&nbsp;</span>
      <span class="announce__item">
        <a href="https://www.google.com">Cosmétique certifié bio ECOCERT</a>
      </span>
      <span class="announce__sep" aria-hidden="true">&nbsp;·&nbsp;</span>
      <span class="announce__item">
        <a href="https://www.google.com">Fait au Canada avec amour</a>
      </span>
    </span>
  </div>
</div>

<!-- ── Sticky site header ────────────────────────────────────── -->
<header class="site-header" role="banner">
  <div class="site-header__inner wrap">

    <!-- LEFT — desktop nav / mobile hamburger -->
    <div class="site-header__left" aria-label="Navigation principale">

      <!-- Hamburger — mobile only -->
      <button class="site-header__hamburger" aria-label="Ouvrir le menu" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <line x1="2" y1="5.5"  x2="20" y2="5.5"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="2" y1="11"   x2="20" y2="11"   stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="2" y1="16.5" x2="20" y2="16.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Desktop nav links -->
      <nav class="site-header__nav" aria-label="Menu principal">
        <a href="https://www.google.com" class="site-header__nav-link">Pour Elle</a>
        <a href="https://www.google.com" class="site-header__nav-link">Pour Lui</a>
        <a href="https://www.google.com" class="site-header__nav-link">Coffrets</a>
        <a href="https://www.google.com" class="site-header__nav-link">Promotions</a>
        <a href="https://www.google.com" class="site-header__nav-link">À&nbsp;propos</a>
      </nav>
    </div>

    <!-- CENTER — Logo -->
    <div class="site-header__logo-wrap">
      <a href="https://www.google.com" class="site-header__logo-link" aria-label="Naturesse Cosmetics — Accueil">
        <img
          src="assets/logo.png"
          alt="Naturesse Cosmetics"
          class="site-header__logo-img"
          width="118"
          height="auto"
          loading="eager"
          decoding="async"
        />
      </a>
    </div>

    <!-- RIGHT — actions cluster -->
    <div class="site-header__actions" aria-label="Actions">

      <!-- "Boutique" pill CTA — desktop only -->
      <a href="https://www.google.com" class="btn btn-primary site-header__cta" aria-label="Accéder à la boutique">
        Boutique
      </a>

      <!-- Search — desktop only -->
      <button class="site-header__icon-btn site-header__icon-btn--search" aria-label="Rechercher">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <circle cx="9.5" cy="9.5" r="6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="14.5" y1="14.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Account — desktop only -->
      <button class="site-header__icon-btn site-header__icon-btn--account" aria-label="Mon compte">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <circle cx="11" cy="7.5" r="4" stroke="currentColor" stroke-width="1.7"/>
          <path d="M3 20c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Cart — always visible -->
      <button class="site-header__icon-btn site-header__icon-btn--cart" aria-label="Panier (0 article)">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M1 1h3.2l2.1 10.8a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L20 5H5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8.5"  cy="19" r="1.4" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="17.5" cy="19" r="1.4" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="site-header__cart-badge" aria-hidden="true">0</span>
      </button>

    </div><!-- /.site-header__actions -->
  </div><!-- /.site-header__inner -->
</header>
