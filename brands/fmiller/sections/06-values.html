<!-- ============================================================
   F. MILLER — 06-values.html
   "NO / YES" ethos band — dark olive background, cream text
   ============================================================ -->

<section class="sec s-values" aria-labelledby="values-heading">
  <div class="wrap">

    <!-- Header -->
    <div class="s-values__header reveal">
      <span class="eyebrow s-values__eyebrow">Our Ethos</span>
      <h2 id="values-heading" class="s-values__heading">
        What we leave out matters<br>as much as what we put in.
      </h2>
    </div>

    <!-- Two-column NO / YES -->
    <div class="s-values__columns reveal" style="transition-delay:.1s">

      <!-- LEFT: We say NO -->
      <div class="s-values__col s-values__col--no">
        <h3 class="s-values__col-label">We say no to</h3>
        <ul class="s-values__list" role="list">

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--no" aria-hidden="true">
              <!-- minus / ✕ -->
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="4" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Compromises</span>
          </li>

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--no" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="4" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Cruelty</span>
          </li>

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--no" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="4" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Greenwashing</span>
          </li>

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--no" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="4" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Overcomplication</span>
          </li>

        </ul>
      </div>

      <!-- Divider (visible on desktop) -->
      <div class="s-values__divider" aria-hidden="true"></div>

      <!-- RIGHT: We say YES -->
      <div class="s-values__col s-values__col--yes">
        <h3 class="s-values__col-label">We say yes to</h3>
        <ul class="s-values__list" role="list">

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--yes" aria-hidden="true">
              <!-- leaf / ✓ -->
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 15C9 15 3.5 11.75 3.5 7.25C3.5 4.625 6.01 2.5 9 2.5C11.99 2.5 14.5 4.625 14.5 7.25C14.5 11.75 9 15 9 15Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
                <path d="M9 15V8" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                <path d="M9 10.5C9 10.5 7 9.25 6.5 7.25" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Efficacy</span>
          </li>

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--yes" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 15C9 15 3.5 11.75 3.5 7.25C3.5 4.625 6.01 2.5 9 2.5C11.99 2.5 14.5 4.625 14.5 7.25C14.5 11.75 9 15 9 15Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
                <path d="M9 15V8" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                <path d="M9 10.5C9 10.5 7 9.25 6.5 7.25" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Ethical sourcing</span>
          </li>

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--yes" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 15C9 15 3.5 11.75 3.5 7.25C3.5 4.625 6.01 2.5 9 2.5C11.99 2.5 14.5 4.625 14.5 7.25C14.5 11.75 9 15 9 15Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
                <path d="M9 15V8" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                <path d="M9 10.5C9 10.5 7 9.25 6.5 7.25" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Transparency</span>
          </li>

          <li class="s-values__item">
            <span class="ic s-values__icon s-values__icon--yes" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 15C9 15 3.5 11.75 3.5 7.25C3.5 4.625 6.01 2.5 9 2.5C11.99 2.5 14.5 4.625 14.5 7.25C14.5 11.75 9 15 9 15Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
                <path d="M9 15V8" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                <path d="M9 10.5C9 10.5 7 9.25 6.5 7.25" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Sustainability</span>
          </li>

        </ul>
      </div>

    </div><!-- /.s-values__columns -->

    <!-- Footer CTA -->
    <div class="s-values__footer reveal" style="transition-delay:.2s">
      <a href="https://www.google.com" class="btn btn-light">Read our ethos</a>
    </div>

  </div><!-- /.wrap -->
</section>
