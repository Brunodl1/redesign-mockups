<!-- ============================================================
   F. MILLER — 01-header.html
   Announcement bar + sticky site header
   ============================================================ -->

<!-- ANNOUNCEMENT BAR -->
<div class="announce" role="banner" aria-label="Site announcement">
  <div class="announce__inner">
    <span class="announce__item announce__item--primary">Free shipping on orders over $150</span>
    <span class="announce__sep" aria-hidden="true">·</span>
    <span class="announce__item announce__item--secondary">100% botanical, toxin-free</span>
    <span class="announce__sep" aria-hidden="true">·</span>
    <span class="announce__item announce__item--secondary">Handcrafted in Toronto</span>
  </div>
</div>

<!-- SITE HEADER -->
<header class="site-header" role="banner">
  <div class="site-header__inner wrap">

    <!-- LEFT: Nav (desktop) / Hamburger (mobile) -->
    <div class="site-header__left">
      <!-- Mobile hamburger -->
      <button class="site-header__hamburger" aria-label="Open menu" aria-expanded="false">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none" aria-hidden="true">
          <line x1="0" y1="1"  x2="22" y2="1"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="0" y1="8"  x2="22" y2="8"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="0" y1="15" x2="22" y2="15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Desktop nav -->
      <nav class="site-header__nav" aria-label="Main navigation">
        <a href="https://www.google.com" class="site-header__nav-link">Face</a>
        <a href="https://www.google.com" class="site-header__nav-link">Hair &amp; Body</a>
        <a href="https://www.google.com" class="site-header__nav-link">Kits</a>
        <a href="https://www.google.com" class="site-header__nav-link">Objects</a>
        <a href="https://www.google.com" class="site-header__nav-link">All</a>
      </nav>
    </div>

    <!-- CENTER: Wordmark -->
    <div class="site-header__center">
      <a class="site-header__logo" href="https://www.google.com" aria-label="F. Miller — go to homepage">F. MILLER</a>
    </div>

    <!-- RIGHT: Actions -->
    <div class="site-header__right">
      <!-- Search -->
      <button class="site-header__action site-header__action--search" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="12.8" y1="12.8" x2="18" y2="18" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Account -->
      <button class="site-header__action site-header__action--account" aria-label="Account">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="6.5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M2.5 18c0-4.142 3.358-7.5 7.5-7.5s7.5 3.358 7.5 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Cart with badge -->
      <button class="site-header__action site-header__action--cart" aria-label="Cart, 0 items">
        <span class="site-header__cart-wrap">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M2 2h2.2l2.5 10h9l1.8-7H5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="8.5" cy="16.5" r="1.2" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="14.5" cy="16.5" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span class="site-header__cart-badge" aria-hidden="true">0</span>
        </span>
      </button>
    </div>

  </div>
</header>
