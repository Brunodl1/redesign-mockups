<!-- ============================================================
     Lymphology Skincare — 03-credibility.html
     Credibility strip: 4 trust signals, slim band, bg --surface-2
     ============================================================ -->

<section class="sec s-credibility" aria-label="Trust & certifications">
  <div class="wrap">
    <ul class="cred__list" role="list">

      <!-- 1. Health Canada Approved -->
      <li class="cred__item">
        <span class="cred__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none"
               width="36" height="36" aria-hidden="true">
            <path d="M20 4 L34 9.5 L34 20 C34 28.5 27.5 35.5 20 38 C12.5 35.5 6 28.5 6 20 L6 9.5 Z"
                  stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <polyline points="14,20.5 18.5,25.5 27,15"
                      stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="cred__text">
          <strong class="cred__label">Health Canada Approved</strong>
          <span class="cred__sub">A regulated, trusted formula</span>
        </span>
      </li>

      <!-- 2. Ecocert & GMP Certified -->
      <li class="cred__item">
        <span class="cred__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none"
               width="36" height="36" aria-hidden="true">
            <!-- Leaf shape -->
            <path d="M20 34 C20 34 8 26 8 16 C8 10.477 13 6 20 6 C27 6 32 10.477 32 16 C32 26 20 34 20 34Z"
                  stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <!-- Leaf vein -->
            <line x1="20" y1="34" x2="20" y2="14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <line x1="20" y1="18" x2="14" y2="23" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="20" y1="22" x2="26" y2="27" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            <!-- Ribbon check at bottom -->
            <polyline points="15,10.5 19,14 26,8"
                      stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="cred__text">
          <strong class="cred__label">Ecocert &amp; GMP Certified</strong>
          <span class="cred__sub">Organic, clean, non-GMO</span>
        </span>
      </li>

      <!-- 3. Made by a Lymphedema Therapist -->
      <li class="cred__item">
        <span class="cred__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none"
               width="36" height="36" aria-hidden="true">
            <!-- Stethoscope head circle -->
            <circle cx="27" cy="29" r="4.5" stroke="currentColor" stroke-width="1.6"/>
            <!-- Tubing arc -->
            <path d="M12 8 C12 8 10 14 10 18 C10 24 15 26 20 26 C24 26 27 24 27 24.5"
                  stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <!-- Earpieces -->
            <path d="M8 8 L16 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="8"  cy="8"  r="1.7" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="16" cy="8"  r="1.7" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        <span class="cred__text">
          <strong class="cred__label">Made by a Lymphedema Therapist</strong>
          <span class="cred__sub">Certified CLT since 2012</span>
        </span>
      </li>

      <!-- 4. Made in Canada -->
      <li class="cred__item">
        <span class="cred__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none"
               width="36" height="36" aria-hidden="true">
            <!-- Maple leaf simplified outline -->
            <path d="M20 6
                     L22 12 L28 11 L25 16
                     L33 18 L28 20 L30 26
                     L22 22 L22 34 L18 34 L18 22
                     L10 26 L12 20 L7 18 L15 16
                     L12 11 L18 12 Z"
                  stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="cred__text">
          <strong class="cred__label">Made in Canada</strong>
          <span class="cred__sub">Formulated in Montréal</span>
        </span>
      </li>

    </ul>
  </div>
</section>
