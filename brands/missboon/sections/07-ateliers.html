<!-- ============================================================
     Miss Boon — 07-ateliers.html
     Ateliers / workshops split band — image left, copy right (FRENCH)
     ============================================================ -->

<section class="sec s-ateliers">
  <div class="wrap">
    <div class="s-ateliers__inner">

      <!-- LEFT: workshop image -->
      <div class="s-ateliers__media reveal">
        <div class="s-ateliers__img-wrap">
          <img
            src="https://missboon.ca/cdn/shop/files/IMG_94722.jpg?v=1712254264&width=1000"
            alt="Atelier de bouturage chez Miss Boon — apprendre entre passionnés"
            loading="lazy"
            decoding="async"
            class="s-ateliers__img"
          >
        </div>
      </div>

      <!-- RIGHT: copy -->
      <div class="s-ateliers__copy reveal" style="--delay:.15s">
        <p class="eyebrow">NOS ATELIERS</p>
        <h2 class="s-ateliers__heading">Apprenez, entre passionnés de plantes.</h2>
        <p class="s-ateliers__lead">Bouturage, rempotage, crochet végétal et plus encore — nos ateliers en boutique réunissent débutants et mordus pour apprendre, créer et repartir les mains vertes.</p>

        <!-- Chips row -->
        <div class="s-ateliers__chips">
          <span class="chip">Bouturage</span>
          <span class="chip">Rempotage</span>
          <span class="chip">Crochet végétal</span>
        </div>

        <a href="https://www.google.com" class="btn btn-primary">Voir les ateliers</a>
      </div>

    </div>
  </div>
</section>
