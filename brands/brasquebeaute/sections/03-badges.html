<!-- =============================================
     BRASQUÉ BEAUTÉ — Section 03 : Badge Strip
     Bande de certifications — claims propres
     ============================================= -->

<section class="sec s-badges" aria-label="Nos engagements">
  <div class="wrap">
    <ul class="s-badges__list" role="list">

      <!-- Végane -->
      <li class="s-badges__item">
        <span class="s-badges__icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none"
               stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <!-- Leaf outline -->
            <path d="M15 26 C15 26 4 20 4 10 C4 10 10 4 20 6 C20 6 26 12 24 20 C22 28 15 26 15 26Z"/>
            <path d="M15 26 C15 26 15 14 10 8"/>
          </svg>
        </span>
        <span class="s-badges__label">Végane</span>
      </li>

      <!-- Sans paraben -->
      <li class="s-badges__item">
        <span class="s-badges__icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none"
               stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <!-- Shield with X cross (no/ban) -->
            <path d="M15 3 L25 7 L25 16 C25 21.5 20 26 15 28 C10 26 5 21.5 5 16 L5 7 Z"/>
            <line x1="11" y1="11" x2="19" y2="19"/>
            <line x1="19" y1="11" x2="11" y2="19"/>
          </svg>
        </span>
        <span class="s-badges__label">Sans paraben</span>
      </li>

      <!-- Sans cruauté -->
      <li class="s-badges__item">
        <span class="s-badges__icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none"
               stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <!-- Bunny silhouette / cruelty-free -->
            <ellipse cx="15" cy="18" rx="7" ry="6"/>
            <path d="M10 12 C8 6 10 3 12 5 C12 5 13 8 13 12"/>
            <path d="M20 12 C22 6 20 3 18 5 C18 5 17 8 17 12"/>
            <circle cx="12.5" cy="18.5" r=".8" fill="var(--accent)"/>
            <circle cx="17.5" cy="18.5" r=".8" fill="var(--accent)"/>
            <path d="M13.5 21 Q15 22.5 16.5 21"/>
          </svg>
        </span>
        <span class="s-badges__label">Sans cruauté</span>
      </li>

      <!-- Non toxique -->
      <li class="s-badges__item">
        <span class="s-badges__icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none"
               stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <!-- Water drop with checkmark -->
            <path d="M15 4 C15 4 6 14 6 19 A9 9 0 0 0 24 19 C24 14 15 4 15 4Z"/>
            <polyline points="11,19 14,22 20,15"/>
          </svg>
        </span>
        <span class="s-badges__label">Non toxique</span>
      </li>

      <!-- Fait au Québec -->
      <li class="s-badges__item">
        <span class="s-badges__icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none"
               stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <!-- Map pin / location -->
            <path d="M15 3 C10.03 3 6 7.03 6 12 C6 18.5 15 28 15 28 C15 28 24 18.5 24 12 C24 7.03 19.97 3 15 3Z"/>
            <circle cx="15" cy="12" r="3.5"/>
          </svg>
        </span>
        <span class="s-badges__label">Fait au Québec</span>
      </li>

    </ul>
  </div>
</section>
