<!-- =============================================
     BRASQUÉ BEAUTÉ — Section 10: Infolettre
     Fond --accent (teal), texte blanc, bouton .btn-light
     ============================================= -->

<section class="sec s-newsletter" aria-labelledby="nl-heading">
  <div class="wrap s-newsletter__wrap">

    <!-- Eyebrow -->
    <p class="eyebrow s-newsletter__eyebrow">Le rituel Brasqué</p>

    <!-- Heading -->
    <h2 class="s-newsletter__heading" id="nl-heading">
      Obtenez&nbsp;10&nbsp;% sur votre première commande
    </h2>

    <!-- Sub-copy -->
    <p class="s-newsletter__sub">
      Conseils pro-âge, nouveautés et offres&nbsp;— directement dans votre boîte courriel.
    </p>

    <!-- Inline email form -->
    <form class="s-newsletter__form" onsubmit="return false" novalidate aria-label="Inscription à l'infolettre">
      <div class="s-newsletter__field-wrap">
        <label for="nl-email" class="s-newsletter__label">Adresse courriel</label>
        <input
          class="s-newsletter__input"
          type="email"
          id="nl-email"
          name="email"
          placeholder="votre@courriel.com"
          autocomplete="email"
          required
        />
      </div>
      <button type="submit" class="btn btn-light s-newsletter__btn">
        S'abonner
      </button>
    </form>

    <!-- Tiny print -->
    <p class="s-newsletter__fine">Désabonnement en tout temps.</p>

  </div>
</section>
