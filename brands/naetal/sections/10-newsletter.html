<!-- ============================================================
     Naetal Skincare — 10-newsletter.html
     Newsletter signup band
     ============================================================ -->
<section class="sec s-newsletter">
  <div class="wrap">
    <div class="s-newsletter__inner">
      <p class="eyebrow s-newsletter__eyebrow">Join the Naetal Family</p>
      <h2 class="s-newsletter__h2">10% off your first ritual.</h2>
      <p class="s-newsletter__sub">Gentle skincare tips for pregnancy, postpartum &amp; baby — plus 10% off your first order.</p>

      <form class="s-newsletter__form" onsubmit="return false" novalidate>
        <div class="s-newsletter__field-wrap">
          <input
            class="s-newsletter__input"
            type="email"
            placeholder="Your email address"
            aria-label="Email address"
            autocomplete="email"
          />
          <button class="btn btn-primary s-newsletter__btn" type="submit">Subscribe</button>
        </div>
        <p class="s-newsletter__fine">Unsubscribe anytime.</p>
      </form>
    </div>
  </div>
</section>
