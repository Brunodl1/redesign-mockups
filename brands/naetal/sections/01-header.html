<!-- ============================================================
     Naetal Skincare — 01-header.html
     Announcement bar + sticky site header
     ============================================================ -->

<!-- ANNOUNCEMENT BAR -->
<div class="announce" role="note" aria-label="Site-wide announcement">
  <div class="announce__inner">
    <span class="announce__item announce__item--primary">Clean &amp; pregnancy-safe skincare</span>
    <span class="announce__sep" aria-hidden="true">&nbsp;·&nbsp;</span>
    <span class="announce__item announce__item--secondary">Small-batch, made in Canada</span>
    <span class="announce__sep" aria-hidden="true">&nbsp;·&nbsp;</span>
    <span class="announce__item announce__item--secondary">Free shipping over $100</span>
  </div>
</div>

<!-- SITE HEADER -->
<header class="site-header" role="banner">
  <div class="site-header__inner wrap">

    <!-- LEFT: hamburger (mobile) / nav (desktop) -->
    <div class="site-header__left" aria-label="Primary navigation">

      <!-- Mobile hamburger -->
      <button class="site-header__hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true" focusable="false">
          <line x1="2" y1="5.5"  x2="20" y2="5.5"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="11"   x2="20" y2="11"   stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="16.5" x2="20" y2="16.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Desktop nav -->
      <nav id="site-nav" class="site-header__nav" aria-label="Main navigation">
        <ul class="site-header__nav-list" role="list">
          <li><a href="https://www.google.com" class="site-header__nav-link">Shop</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Mama Care</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Baby Care</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Bath &amp; Ritual</a></li>
          <li><a href="https://www.google.com" class="site-header__nav-link">Bundles &amp; Gifts</a></li>
        </ul>
      </nav>
    </div>

    <!-- CENTER: logo -->
    <div class="site-header__logo-wrap">
      <a href="https://www.google.com" class="site-header__logo-link" aria-label="Naetal Skincare — home">
        <img
          src="assets/logo.png"
          alt="Naetal Skincare"
          class="site-header__logo-img"
          width="auto"
          height="38"
          loading="eager"
          decoding="async"
        >
      </a>
    </div>

    <!-- RIGHT: actions -->
    <div class="site-header__actions" aria-label="Site actions">

      <!-- Shop pill — desktop only -->
      <a href="https://www.google.com" class="btn btn-primary site-header__shop-btn" aria-label="Shop now">Shop</a>

      <!-- Search — desktop only -->
      <button class="site-header__icon-btn site-header__search" aria-label="Search" type="button">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true" focusable="false">
          <circle cx="9.5" cy="9.5" r="6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="14.5" y1="14.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Account — desktop only -->
      <button class="site-header__icon-btn site-header__account" aria-label="Account" type="button">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true" focusable="false">
          <circle cx="11" cy="7.5" r="4" stroke="currentColor" stroke-width="1.4"/>
          <path d="M2.5 20c0-4.142 3.806-7.5 8.5-7.5s8.5 3.358 8.5 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Cart — always visible -->
      <a href="https://www.google.com" class="site-header__icon-btn site-header__cart" aria-label="Cart — 0 items">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true" focusable="false">
          <path d="M1 1.5h3l2.4 11.5h10.2l2.4-8H5.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="18.5" r="1.4" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="16" cy="18.5" r="1.4" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span class="site-header__cart-badge" aria-hidden="true">0</span>
      </a>

    </div>
  </div>
</header>
